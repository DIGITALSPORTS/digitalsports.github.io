<!DOCTYPE HTML>
<html>
	<head>
		<title>{% if page.title %}{{ page.title }} | {% endif %}{{ site.title }}</title>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no" />
		<link rel="stylesheet" href="{{ '/assets/css/main.css' | relative_url }}" />
		<link rel="stylesheet" href="{{ '/assets/css/digitalsports.css' | relative_url }}" />
		<noscript><link rel="stylesheet" href="{{ '/assets/css/noscript.css' | relative_url }}" /></noscript>
	</head>
	<body class="is-preload">

		<div id="wrapper" class="fade-in">

			<div id="intro">
				<h1>{{ site.title }}</h1>
				<p>{{ site.description }}</p>
				<ul class="actions">
					<li>
						<a href="#header" class="button icon solid solo fa-arrow-down scrolly">Continue</a>
					</li>
				</ul>
			</div>

			<header id="header">
				<a href="{{ '/' | relative_url }}" class="logo">{{ site.title }}</a>
			</header>

			{% include nav.html %}

			<div id="main">
				{{ content }}
			</div>

			<footer id="footer">
				<section>
					<p>Replace this footer content with your own contact details.</p>
				</section>
				<section class="split contact">
					<section>
						<h3>Email</h3>
						<p><a href="mailto:you@example.com">you@example.com</a></p>
					</section>
					<section>
						<h3>Social</h3>
						<ul class="icons alt">
							<li><a href="#" class="icon brands alt fa-linkedin"><span class="label">LinkedIn</span></a></li>
							<li><a href="#" class="icon brands alt fa-github"><span class="label">GitHub</span></a></li>
						</ul>
					</section>
				</section>
			</footer>

			<div id="copyright">
				<ul><li>&copy; {{ site.title }}</li><li>Design: <a href="https://html5up.net">HTML5 UP</a></li></ul>
			</div>

		</div>

		<script src="{{ '/assets/js/jquery.min.js' | relative_url }}"></script>
		<script src="{{ '/assets/js/jquery.scrollex.min.js' | relative_url }}"></script>
		<script src="{{ '/assets/js/jquery.scrolly.min.js' | relative_url }}"></script>
		<script src="{{ '/assets/js/browser.min.js' | relative_url }}"></script>
		<script src="{{ '/assets/js/breakpoints.min.js' | relative_url }}"></script>
		<script src="{{ '/assets/js/util.js' | relative_url }}"></script>
		<script src="{{ '/assets/js/main.js' | relative_url }}"></script>
	</body>
</html>
