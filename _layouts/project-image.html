---
layout: default
---

{% if page.hero_image %}
<div class="project-hero-full">
	<a
		href="{{ page.hero_image | relative_url }}"
		class="glightbox project-hero-lightbox"
		data-gallery="{{ page.slug | default: page.title | slugify }}-hero"
	>
		<img src="{{ page.hero_image | relative_url }}" alt="{{ page.title }}" />
	</a>
</div>
{% endif %}

<article class="post project-page project-page-image">

{% include project-title-bar.html %}

	<div class="project-body">
		{{ content }}
	</div>

	{% if page.gallery %}
		<section class="project-gallery-section">
			{% include gallery-scroll.html items=page.gallery %}
		</section>
	{% endif %}
</article>

{% include pagination.html %}
