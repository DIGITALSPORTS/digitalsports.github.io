---
layout: default
---

<article class="post project-text">
	<header class="major">
		<h1>{{ page.title }}</h1>
		<p>{{ page.subtitle }}</p>
		{% if page.date_text %}
			<span class="date">{{ page.date_text }}</span>
		{% endif %}
	</header>

	{{ content }}
	
</article>
