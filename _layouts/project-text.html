---
layout: default
---

<article class="post">
	<header class="major">
		{% if page.date_text %}
			<span class="date">{{ page.date_text }}</span>
		{% endif %}
		<h1>{{ page.title }}</h1>
		<p>{{ page.subtitle }}</p>
	</header>

	{% if page.hero_image %}
		<span class="image main">
			<img src="{{ page.hero_image | relative_url }}" alt="{{ page.title }}" />
		</span>
	{% endif %}

	{{ content }}

	{% if page.video_url %}
		<h2>Video</h2>
		<div class="video-embed">
			<iframe width="100%" height="450"
				src="{{ page.video_url }}"
				title="{{ page.title }}"
				frameborder="0"
				allowfullscreen>
			</iframe>
		</div>
	{% endif %}
</article>
