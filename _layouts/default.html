<!DOCTYPE HTML>
<html>
	<head>
		<title>{% if page.title %}{{ page.title }} | {% endif %}{{ site.title }}</title>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no" />
		<link rel="stylesheet" href="{{ '/assets/css/main.css' | relative_url }}" />
		<link rel="stylesheet" href="{{ '/assets/css/syntax.css' | relative_url }}" />
		<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/glightbox/dist/css/glightbox.min.css" />
		<link rel="stylesheet" href="{{ '/assets/css/chon.css' | relative_url }}" />
		<link rel="stylesheet" href="{{ '/assets/css/lightbox-chon.css' | relative_url }}" />
		<noscript><link rel="stylesheet" href="{{ '/assets/css/noscript.css' | relative_url }}" /></noscript>
	</head>
	<body class="is-preload">

		<div id="wrapper">

			<header id="header">
				<a href="{{ '/' | relative_url }}" class="logo" aria-label="Home">
					<img src="{{ '/images/chon-logo.png' | relative_url }}" alt="Chon Kemp Logo">
				</a>
			</header>

			{% include nav.html %}

			<div id="main">
				{{ content }}
			</div>

			{% include footer.html %}
			
			{% include copyright.html %}

		</div>

		<script src="{{ '/assets/js/jquery.min.js' | relative_url }}"></script>
		<script src="{{ '/assets/js/jquery.scrollex.min.js' | relative_url }}"></script>
		<script src="{{ '/assets/js/jquery.scrolly.min.js' | relative_url }}"></script>
		<script src="{{ '/assets/js/browser.min.js' | relative_url }}"></script>
		<script src="{{ '/assets/js/breakpoints.min.js' | relative_url }}"></script>
		<script src="{{ '/assets/js/util.js' | relative_url }}"></script>
		<script src="{{ '/assets/js/main.js' | relative_url }}"></script>
		<script src="{{ '/assets/js/digitalsports.js' | relative_url }}"></script>
		
		<script src="https://cdn.jsdelivr.net/npm/glightbox/dist/js/glightbox.min.js"></script>
		<script>
			document.addEventListener('DOMContentLoaded', function () {
				GLightbox({
					selector: '.glightbox'
				});
			});
		</script>
	</body>
</html>
