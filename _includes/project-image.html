<!-- _includes/project-image.html -->
{% assign image_title = include.title | default: include.caption | default: page.title %}

<div class="image main project-inline-image">
	<a
		href="{{ include.src | relative_url }}"
		class="glightbox"
		data-gallery="{{ include.gallery_name | default: page.slug | default: page.title | slugify }}-inline-images"
		data-title="{{ image_title | escape }}"
	>
		<img src="{{ include.src | relative_url }}" alt="{{ include.alt | default: image_title | escape }}" />
	</a>

	{% if include.caption %}
		<p class="project-inline-image-caption">{{ include.caption }}</p>
	{% endif %}
</div>
